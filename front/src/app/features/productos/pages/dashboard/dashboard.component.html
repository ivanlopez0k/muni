<div class="contenedor_todo">
  <div class="dashboard-container">
  <div class="dashboard-header">
    <h2>Resultado de la encuesta</h2>
  </div>

  <form [formGroup]="form" class="dashboard-form">
    <app-custom-input
      [placeholder]="'Buscar por procedencia'"
      [control]="form.controls.filtrador"
    />
  </form>

  <div class="dashboard-actions">
    <button class="dashboard-button" >Exportar a hoja de datos</button>
  </div>
</div>

<div class="contenedor_dashboard">
  <mat-tab-group class="dashboard">
    <mat-tab label="Tablas">
      <div class="contenedor_tablas">
        <table mat-table [dataSource]="encuestaSource" class="mat-elevation-z8 contenido_tablas">
          <ng-container  matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>Id</th>
            <td mat-cell *matCellDef="let e">{{ e['id']}}</td>
          </ng-container>
          <ng-container matColumnDef="procedencia">
            <th mat-header-cell *matHeaderCellDef>procedencia</th>
            <td mat-cell *matCellDef="let e">{{ e.Turista['procedencia'] }}</td>
          </ng-container>
          <ng-container matColumnDef="fecha">
            <th mat-header-cell *matHeaderCellDef>Fecha</th>
            <td mat-cell *matCellDef="let e">{{ e.createdAt | date: 'dd/MM/yyyy'}}</td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumnsEncuesta"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumnsEncuesta"></tr>
        </table>

        <mat-paginator
          #paginatorEncuesta
          [pageSize]="5"
          [pageSizeOptions]="[5, 10, 25, 100]"
          aria-label="Select page">
        </mat-paginator>

      </div>
    </mat-tab>

    <mat-tab label="Gráficos">
      <div class="graficos-container">Acá van tus gráficos.</div>
    </mat-tab>

    <mat-tab label="Mensajes">
      <div class="contenedor_tablas">
        <table mat-table [dataSource]="formularioSource" class="mat-elevation-z8 contenido_tablas">
          <ng-container  matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>Id</th>
            <td mat-cell *matCellDef="let f">{{ f.id}}</td>
          </ng-container>
          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef>Nombre</th>
            <td mat-cell *matCellDef="let f">{{ f.nombre }}</td>
          </ng-container>
          <ng-container matColumnDef="fecha">
            <th mat-header-cell *matHeaderCellDef>Fecha</th>
            <td mat-cell *matCellDef="let f">{{ f.fecha }}</td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumnsFormulario"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumnsFormulario"></tr>
        </table>

        <mat-paginator
          #paginatorFormulario
          class="paginator"
          [pageSize]="5"
          [pageSizeOptions]="[5, 10, 25, 100]"
          aria-label="Select page">
        </mat-paginator>

      </div>
    </mat-tab>
  </mat-tab-group>
</div>

</div>
