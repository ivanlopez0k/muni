<div class="MAINBOX">
        <form class="formulario" [formGroup]="form" (ngSubmit)="login()">
          <h3 class="TITULO">Iniciar Sesión</h3>
          <div class="BOXUSUARIO">
            <app-custom-input
              [label]="'Usuario'"
              [control]="form.controls.username"
              [type]="'text'"
              [placeholder]="'Ingrese el usuario'"
            />
          </div>
          <div class="BOXCONTRASEÑA">
            <app-custom-input
              [label]="'Contraseña'"
              [control]="form.controls.password"
              [type]="'text'"
              [placeholder]="'Ingrese la contraseña'"
            />
          </div>
          <div >
            <button class="boton" [disabled]="!form.valid" type="submit">Ingresar</button>
          </div>
        </form>
</div>
