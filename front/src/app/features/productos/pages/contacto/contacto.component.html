<div class="imagen">
  <div class="fondo_formulario">
    <form class="formulario" [formGroup]="form" (ngSubmit)="enviarFormulario()">
        <h2 class="titulo">Comunícate con nosotros</h2>
        <app-custom-input
          [label]="'Nombre y apellido'"
          [control]="form.controls.name"
          [type]="'text'"
        />
        <app-custom-input
          [label]="'Correo Electronico'"
          [control]="form.controls.email"
          [type]="'text'"
        />
        <app-custom-input
          [label]="'Dejanos tu mensaje'"
          [control]="form.controls.message"
          [type]="'textarea'"
        />
        <button class="boton" type="submit" [disabled]="!form.valid">Enviar</button>
    </form>
  </div>
</div>
